<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <i class="fas fa-sun toggle-theme-btn" id="themeToggle"></i>
            </div>
            <div class="header-center">
                <h1 class="app-title">Study Planner</h1>
            </div>
            <div class="header-right">
                <i class="fas fa-calculator toggle-calculator-btn" id="calculatorToggle"></i>
            </div>
        </header>

        <main class="main-content">
            <section id="dashboard-view" class="view active">
                <h2>My To-Do List</h2>
                <div class="add-task-container">
                    <input type="text" id="newTaskInput" placeholder="Add a new task...">
                    <button id="addTaskBtn" class="btn">Add Task</button>
                </div>
                <div id="taskList" class="task-list">
                    </div>

                <h2>Pomodoro Timer</h2>
                <div class="pomodoro-timer-container">
                    <div class="timer-display" id="timerDisplay">25:00</div>
                    <div class="timer-controls">
                        <button id="startTimerBtn" class="btn">Start</button>
                        <button id="pauseTimerBtn" class="btn">Pause</button>
                        <button id="resetTimerBtn" class="btn">Reset</button>
                    </div>
                    <div class="timer-settings">
                        <label for="workDuration">Work (min):</label>
                        <input type="number" id="workDuration" value="25" min="1">
                        <label for="shortBreakDuration">Short Break (min):</label>
                        <input type="number" id="shortBreakDuration" value="5" min="1">
                        <label for="longBreakDuration">Long Break (min):</label>
                        <input type="number" id="longBreakDuration" value="15" min="1">
                    </div>
                    <p>Completed Sessions: <span id="completedSessions">0</span></p>
                    <audio id="timerSound" src="timer-sound.mp3" preload="auto"></audio>
                </div>
            </section>

            <section id="add-task-view" class="view">
                <h2>Add New Task</h2>
                <form id="addTaskForm">
                    <div class="form-group">
                        <label for="taskDescription">Task Description:</label>
                        <input type="text" id="taskDescription" required>
                    </div>
                    <div class="form-group">
                        <label for="taskDueDate">Due Date:</label>
                        <input type="date" id="taskDueDate">
                    </div>
                    <div class="form-group">
                        <label for="taskPriority">Priority:</label>
                        <select id="taskPriority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="taskRecurrence">Recurrence:</label>
                        <select id="taskRecurrence">
                            <option value="none">None</option>
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Subtasks (optional):</label>
                        <div id="subtasksContainer">
                            <input type="text" class="subtask-input" placeholder="Subtask description">
                        </div>
                        <button type="button" id="addSubtaskBtn" class="btn-small">Add Subtask</button>
                    </div>
                    <button type="submit" class="btn">Save Task</button>
                    <button type="button" class="btn-secondary back-to-dashboard">Cancel</button>
                </form>
            </section>

            <section id="notes-view" class="view">
                <h2>My Notes</h2>
                <div class="notes-sections">
                    <div class="section-card">
                        <h3>Subjects</h3>
                        <div class="add-subject-container">
                            <input type="text" id="newSubjectInput" placeholder="Add new subject...">
                            <button id="addSubjectBtn" class="btn">Add Subject</button>
                        </div>
                        <ul id="subjectList" class="list">
                            </ul>
                    </div>

                    <div class="section-card">
                        <h3>Text Notes</h3>
                        <div class="form-group">
                            <label for="noteTitle">Note Title:</label>
                            <input type="text" id="noteTitle">
                        </div>
                        <div class="form-group">
                            <label for="noteSubject">Subject:</label>
                            <select id="noteSubject">
                                </select>
                        </div>
                        <div class="form-group">
                            <label for="noteContent">Content:</label>
                            <textarea id="noteContent" rows="5"></textarea>
                        </div>
                        <button id="saveNoteBtn" class="btn">Save Note</button>
                        <button id="clearNoteFormBtn" class="btn-secondary">Clear Form</button>
                        <div id="textNotesList" class="list">
                            </div>
                    </div>

                    <div class="section-card">
                        <h3>PDF Notes by Subject</h3>
                        <div class="form-group">
                            <label for="pdfSubject">Subject:</label>
                            <select id="pdfSubject">
                                </select>
                        </div>
                        <input type="file" id="pdfUploadInput" accept=".pdf">
                        <button id="uploadPdfBtn" class="btn">Upload PDF</button>
                        <div id="pdfNotesList" class="list">
                            </div>
                    </div>
                </div>
            </section>

            <section id="timetable-view" class="view">
                <h2>My Timetable</h2>
                <div class="timetable-nav">
                    <button id="prevWeekBtn" class="btn-small"><i class="fas fa-chevron-left"></i> Prev</button>
                    <span id="currentWeekDisplay"></span>
                    <button id="nextWeekBtn" class="btn-small">Next <i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="timetable-grid" id="timetableGrid">
                    </div>
                <button id="addScheduleItemBtn" class="btn">Add Schedule Item</button>
            </section>

            <section id="add-schedule-view" class="view">
                <h2>Add/Edit Schedule Item</h2>
                <form id="scheduleItemForm">
                    <input type="hidden" id="scheduleItemId">
                    <div class="form-group">
                        <label for="scheduleTitle">Title:</label>
                        <input type="text" id="scheduleTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="scheduleDay">Day of Week:</label>
                        <select id="scheduleDay" required>
                            <option value="Monday">Monday</option>
                            <option value="Tuesday">Tuesday</option>
                            <option value="Wednesday">Wednesday</option>
                            <option value="Thursday">Thursday</option>
                            <option value="Friday">Friday</option>
                            <option value="Saturday">Saturday</option>
                            <option value="Sunday">Sunday</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="scheduleStartTime">Start Time:</label>
                        <input type="time" id="scheduleStartTime" required>
                    </div>
                    <div class="form-group">
                        <label for="scheduleEndTime">End Time:</label>
                        <input type="time" id="scheduleEndTime" required>
                    </div>
                    <div class="form-group">
                        <label for="scheduleColor">Color:</label>
                        <input type="color" id="scheduleColor" value="#00BCD4">
                    </div>
                    <div class="form-group">
                        <label for="scheduleNotes">Notes:</label>
                        <textarea id="scheduleNotes" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn">Save Schedule</button>
                    <button type="button" class="btn-secondary back-to-timetable" id="backToTimetableBtn">Cancel</button>
                </form>
            </section>

            <section id="backup-restore-view" class="view">
                <h2>Data Backup & Restore</h2>
                <button id="backupDataBtn" class="btn">Backup Data</button>
                <input type="file" id="restoreFileInput" accept=".json" style="display: none;">
                <button id="restoreDataBtn" class="btn">Restore Data</button>
            </section>

            <div class="calculator-container" id="calculatorContainer" style="display: none;">
                <input type="text" class="calc-output" id="calcOutput" value="0" readonly>
                <div class="calc-buttons">
                    <button class="calc-btn" data-action="clear">C</button>
                    <button class="calc-btn" data-action="negative">+/-</button>
                    <button class="calc-btn" data-action="percent">%</button>
                    <button class="calc-btn calc-operator" data-action="divide">/</button>
                    <button class="calc-btn" data-action="number">7</button>
                    <button class="calc-btn" data-action="number">8</button>
                    <button class="calc-btn" data-action="number">9</button>
                    <button class="calc-btn calc-operator" data-action="multiply">*</button>
                    <button class="calc-btn" data-action="number">4</button>
                    <button class="calc-btn" data-action="number">5</button>
                    <button class="calc-btn" data-action="number">6</button>
                    <button class="calc-btn calc-operator" data-action="subtract">-</button>
                    <button class="calc-btn" data-action="number">1</button>
                    <button class="calc-btn" data-action="number">2</button>
                    <button class="calc-btn" data-action="number">3</button>
                    <button class="calc-btn calc-operator" data-action="add">+</button>
                    <button class="calc-btn zero-btn" data-action="number">0</button>
                    <button class="calc-btn" data-action="decimal">.</button>
                    <button class="calc-btn calc-operator" data-action="calculate">=</button>
                    <button class="calc-btn apply-calc" data-action="apply">Apply</button>
                </div>
            </div>

        </main>

        <footer class="bottom-nav">
            <div class="nav-item active" data-view="dashboard-view">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" data-view="add-task-view">
                <i class="fas fa-plus-circle"></i>
                <span>Add Task</span>
            </div>
            <div class="nav-item" data-view="notes-view">
                <i class="fas fa-clipboard"></i>
                <span>Notes</span>
            </div>
            <div class="nav-item" data-view="timetable-view">
                <i class="fas fa-calendar-alt"></i>
                <span>Timetable</span>
            </div>
            <div class="nav-item" data-view="backup-restore-view">
                <i class="fas fa-save"></i>
                <span>Backup</span>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Elements ---
            const themeToggleBtn = document.getElementById('themeToggle');
            const calculatorToggleBtn = document.getElementById('calculatorToggle');
            const calculatorContainer = document.getElementById('calculatorContainer');
            const calcOutput = document.getElementById('calcOutput');
            const navItems = document.querySelectorAll('.bottom-nav .nav-item');
            const views = document.querySelectorAll('.main-content .view');
            const backToDashboardBtns = document.querySelectorAll('.back-to-dashboard');
            const backToTimetableBtn = document.getElementById('backToTimetableBtn'); // For add/edit schedule cancel

            // To-Do List elements
            const newTaskInput = document.getElementById('newTaskInput');
            const addTaskBtn = document.getElementById('addTaskBtn');
            const taskList = document.getElementById('taskList');
            const addTaskForm = document.getElementById('addTaskForm');
            const taskDescriptionInput = document.getElementById('taskDescription');
            const taskDueDateInput = document.getElementById('taskDueDate');
            const taskPrioritySelect = document.getElementById('taskPriority');
            const taskRecurrenceSelect = document.getElementById('taskRecurrence');
            const subtasksContainer = document.getElementById('subtasksContainer');
            const addSubtaskBtn = document.getElementById('addSubtaskBtn');

            // Pomodoro Timer elements
            const timerDisplay = document.getElementById('timerDisplay');
            const startTimerBtn = document.getElementById('startTimerBtn');
            const pauseTimerBtn = document.getElementById('pauseTimerBtn');
            const resetTimerBtn = document.getElementById('resetTimerBtn');
            const workDurationInput = document.getElementById('workDuration');
            const shortBreakDurationInput = document.getElementById('shortBreakDuration');
            const longBreakDurationInput = document.getElementById('longBreakDuration');
            const completedSessionsSpan = document.getElementById('completedSessions');
            const timerSound = document.getElementById('timerSound');

            // Notes elements
            const newSubjectInput = document.getElementById('newSubjectInput');
            const addSubjectBtn = document.getElementById('addSubjectBtn');
            const subjectList = document.getElementById('subjectList');
            const noteTitleInput = document.getElementById('noteTitle');
            const noteSubjectSelect = document.getElementById('noteSubject');
            const noteContentInput = document.getElementById('noteContent');
            const saveNoteBtn = document.getElementById('saveNoteBtn');
            const clearNoteFormBtn = document.getElementById('clearNoteFormBtn');
            const textNotesList = document.getElementById('textNotesList');
            const pdfSubjectSelect = document.getElementById('pdfSubject');
            const pdfUploadInput = document.getElementById('pdfUploadInput');
            const uploadPdfBtn = document.getElementById('uploadPdfBtn');
            const pdfNotesList = document.getElementById('pdfNotesList');

            // Timetable elements
            const prevWeekBtn = document.getElementById('prevWeekBtn');
            const nextWeekBtn = document.getElementById('nextWeekBtn');
            const currentWeekDisplay = document.getElementById('currentWeekDisplay');
            const timetableGrid = document.getElementById('timetableGrid');
            const addScheduleItemBtn = document.getElementById('addScheduleItemBtn');
            const scheduleItemForm = document.getElementById('scheduleItemForm');
            const scheduleItemIdInput = document.getElementById('scheduleItemId');
            const scheduleTitleInput = document.getElementById('scheduleTitle');
            const scheduleDaySelect = document.getElementById('scheduleDay');
            const scheduleStartTimeInput = document.getElementById('scheduleStartTime');
            const scheduleEndTimeInput = document.getElementById('scheduleEndTime');
            const scheduleColorInput = document.getElementById('scheduleColor');
            const scheduleNotesInput = document.getElementById('scheduleNotes');

            // Backup/Restore elements
            const backupDataBtn = document.getElementById('backupDataBtn');
            const restoreFileInput = document.getElementById('restoreFileInput');
            const restoreDataBtn = document.getElementById('restoreDataBtn');


            // --- Global Variables ---
            let currentTheme = localStorage.getItem('theme') || 'light';
            let currentView = localStorage.getItem('lastView') || 'dashboard-view';

            let firstOperand = null;
            let operator = null;
            let waitingForSecondOperand = false;
            let currentInput = '0';

            let timer;
            let timeLeft;
            let timerPhase = 'work'; // 'work', 'short-break', 'long-break'
            let pomodoroSessions = parseInt(localStorage.getItem('pomodoroSessions')) || 0;
            let isTimerRunning = false;

            let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            let subjects = JSON.parse(localStorage.getItem('subjects')) || [];
            let textNotes = JSON.parse(localStorage.getItem('textNotes')) || [];
            let pdfNotes = JSON.parse(localStorage.getItem('pdfNotes')) || []; // Stores metadata {id, name, subject, url}
            let scheduleItems = JSON.parse(localStorage.getItem('scheduleItems')) || [];

            let currentWeekStart = new Date(); // Start of the current week displayed in timetable

            // --- Utility Functions ---
            function saveState() {
                localStorage.setItem('tasks', JSON.stringify(tasks));
                localStorage.setItem('subjects', JSON.stringify(subjects));
                localStorage.setItem('textNotes', JSON.stringify(textNotes));
                localStorage.setItem('pdfNotes', JSON.stringify(pdfNotes));
                localStorage.setItem('scheduleItems', JSON.stringify(scheduleItems));
                localStorage.setItem('pomodoroSessions', pomodoroSessions);
            }

            function applyTheme(theme) {
                document.documentElement.className = theme + '-theme';
                localStorage.setItem('theme', theme);
                currentTheme = theme;
                // Update icon
                themeToggleBtn.className = theme === 'light' ? 'fas fa-moon toggle-theme-btn' : 'fas fa-sun toggle-theme-btn';
            }

            function switchView(viewId) {
                views.forEach(view => {
                    view.classList.remove('active');
                });
                document.getElementById(viewId).classList.add('active');

                navItems.forEach(item => {
                    if (item.dataset.view === viewId) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
                localStorage.setItem('lastView', viewId);
                currentView = viewId;

                // Specific actions on view switch
                if (viewId === 'timetable-view') {
                    renderTimetable(currentWeekStart);
                } else if (viewId === 'notes-view') {
                    renderSubjects();
                    renderTextNotes();
                    renderPdfNotes();
                    populateSubjectSelects();
                } else if (viewId === 'dashboard-view') {
                    renderTasks();
                }
            }

            // --- Calculator Logic ---
            function updateCalcOutput() {
                calcOutput.value = currentInput;
            }

            function inputDigit(digit) {
                if (waitingForSecondOperand === true) {
                    currentInput = digit;
                    waitingForSecondOperand = false;
                } else {
                    currentInput = currentInput === '0' ? digit : currentInput + digit;
                }
                updateCalcOutput();
            }

            function inputDecimal(dot) {
                if (!currentInput.includes(dot)) {
                    currentInput += dot;
                }
                updateCalcOutput();
            }

            function handleOperator(nextOperator) {
                const inputValue = parseFloat(currentInput);

                if (firstOperand === null && !isNaN(inputValue)) {
                    firstOperand = inputValue;
                } else if (operator) {
                    const result = operate(firstOperand, inputValue, operator);
                    currentInput = `${parseFloat(result.toFixed(5))}`;
                    firstOperand = result;
                }

                waitingForSecondOperand = true;
                operator = nextOperator;
                updateCalcOutput();
            }

            function operate(first, second, op) {
                if (op === '+') return first + second;
                if (op === '-') return first - second;
                if (op === '*') return first * second;
                if (op === '/') return first / second;
                return second; // Default for when no operator or error
            }

            function resetCalculator() {
                currentInput = '0';
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = false;
                updateCalcOutput();
            }

            function clearCalculator() {
                currentInput = '0';
                firstOperand = null;
                operator = null;
                waitingForSecondOperand = false;
                updateCalcOutput();
            }

            function toggleNegative() {
                currentInput = (parseFloat(currentInput) * -1).toString();
                updateCalcOutput();
            }

            function calculatePercentage() {
                currentInput = (parseFloat(currentInput) / 100).toString();
                updateCalcOutput();
            }

            // --- To-Do List Functions ---
            function renderTasks() {
                taskList.innerHTML = '';
                if (tasks.length === 0) {
                    taskList.innerHTML = '<p class="no-items">No tasks added yet. Start planning!</p>';
                    return;
                }
                tasks.forEach(task => {
                    const taskItem = document.createElement('div');
                    taskItem.classList.add('task-item', task.priority);
                    if (task.completed) {
                        taskItem.classList.add('completed');
                    }
                    taskItem.innerHTML = `
                        <div class="task-info">
                            <input type="checkbox" data-id="${task.id}" ${task.completed ? 'checked' : ''}>
                            <span>${task.description}</span>
                            <span class="task-meta">Due: ${task.dueDate || 'N/A'} | Pri: ${task.priority} | Rec: ${task.recurrence}</span>
                        </div>
                        <div class="task-actions">
                            <button class="btn-small edit-task-btn" data-id="${task.id}"><i class="fas fa-edit"></i></button>
                            <button class="btn-small delete-task-btn" data-id="${task.id}"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    if (task.subtasks && task.subtasks.length > 0) {
                        const subtasksList = document.createElement('ul');
                        subtasksList.classList.add('subtasks-list');
                        task.subtasks.forEach(subtask => {
                            const subtaskItem = document.createElement('li');
                            subtaskItem.textContent = subtask;
                            subtasksList.appendChild(subtaskItem);
                        });
                        taskItem.querySelector('.task-info').appendChild(subtasksList);
                    }
                    taskList.appendChild(taskItem);
                });
            }

            function addTask(e) {
                e.preventDefault(); // Prevent default form submission
                const description = taskDescriptionInput.value.trim();
                const dueDate = taskDueDateInput.value;
                const priority = taskPrioritySelect.value;
                const recurrence = taskRecurrenceSelect.value;
                const subtasks = Array.from(subtasksContainer.querySelectorAll('.subtask-input'))
                                    .map(input => input.value.trim())
                                    .filter(text => text !== '');

                if (description) {
                    const newTask = {
                        id: Date.now().toString(),
                        description,
                        dueDate,
                        priority,
                        recurrence,
                        subtasks,
                        completed: false
                    };
                    tasks.push(newTask);
                    saveState();
                    renderTasks();
                    addTaskForm.reset(); // Clear the form
                    subtasksContainer.innerHTML = '<input type="text" class="subtask-input" placeholder="Subtask description">'; // Reset subtasks
                    switchView('dashboard-view'); // Go back to dashboard
                } else {
                    alert('Task description cannot be empty.');
                }
            }

            function toggleTaskComplete(id) {
                const task = tasks.find(t => t.id === id);
                if (task) {
                    task.completed = !task.completed;
                    saveState();
                    renderTasks();
                }
            }

            function deleteTask(id) {
                tasks = tasks.filter(t => t.id !== id);
                saveState();
                renderTasks();
            }

            function addSubtaskInput() {
                const input = document.createElement('input');
                input.type = 'text';
                input.classList.add('subtask-input');
                input.placeholder = 'Subtask description';
                subtasksContainer.appendChild(input);
            }

            // --- Pomodoro Timer Functions ---
            function formatTime(seconds) {
                const minutes = Math.floor(seconds / 60);
                const remainingSeconds = seconds % 60;
                return `${minutes.toString().padStart(2, '0')}:${remainingSeconds.toString().padStart(2, '0')}`;
            }

            function startTimer() {
                if (isTimerRunning) return;

                isTimerRunning = true;
                timerSound.pause();
                timerSound.currentTime = 0; // Rewind to start

                if (timeLeft === undefined) { // Initialize if not started yet
                    timeLeft = parseInt(workDurationInput.value) * 60;
                    timerPhase = 'work';
                }

                timer = setInterval(() => {
                    timeLeft--;
                    timerDisplay.textContent = formatTime(timeLeft);

                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        isTimerRunning = false;
                        timerSound.play(); // Play sound when timer ends
                        handleTimerEnd();
                    }
                }, 1000);
                startTimerBtn.textContent = 'Continue'; // Change text to continue after first start
            }

            function pauseTimer() {
                clearInterval(timer);
                isTimerRunning = false;
                startTimerBtn.textContent = 'Resume';
            }

            function resetTimer() {
                clearInterval(timer);
                isTimerRunning = false;
                timerPhase = 'work';
                timeLeft = parseInt(workDurationInput.value) * 60;
                timerDisplay.textContent = formatTime(timeLeft);
                startTimerBtn.textContent = 'Start';
                timerSound.pause();
                timerSound.currentTime = 0;
            }

            function handleTimerEnd() {
                if (timerPhase === 'work') {
                    pomodoroSessions++;
                    completedSessionsSpan.textContent = pomodoroSessions;
                    saveState();

                    if (pomodoroSessions % 4 === 0) {
                        timerPhase = 'long-break';
                        timeLeft = parseInt(longBreakDurationInput.value) * 60;
                        alert('Time for a long break!');
                    } else {
                        timerPhase = 'short-break';
                        timeLeft = parseInt(shortBreakDurationInput.value) * 60;
                        alert('Time for a short break!');
                    }
                } else { // It was a break
                    timerPhase = 'work';
                    timeLeft = parseInt(workDurationInput.value) * 60;
                    alert('Break is over. Back to work!');
                }
                timerDisplay.textContent = formatTime(timeLeft);
                startTimer(); // Automatically start the next phase
            }

            // --- Notes Functions ---
            function renderSubjects() {
                subjectList.innerHTML = '';
                if (subjects.length === 0) {
                    subjectList.innerHTML = '<p class="no-items">No subjects added yet.</p>';
                    return;
                }
                subjects.forEach(subject => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>${subject}</span>
                        <button class="btn-small delete-subject-btn" data-subject="${subject}"><i class="fas fa-trash"></i></button>
                    `;
                    subjectList.appendChild(li);
                });
            }

            function addSubject() {
                const subjectName = newSubjectInput.value.trim();
                if (subjectName && !subjects.includes(subjectName)) {
                    subjects.push(subjectName);
                    saveState();
                    renderSubjects();
                    populateSubjectSelects(); // Update dropdowns
                    newSubjectInput.value = '';
                } else if (subjectName && subjects.includes(subjectName)) {
                    alert('Subject already exists!');
                }
            }

            function deleteSubject(subjectToDelete) {
                // Confirm deletion
                if (!confirm(`Are you sure you want to delete the subject "${subjectToDelete}"? This will also delete all associated notes and PDFs.`)) {
                    return;
                }

                subjects = subjects.filter(s => s !== subjectToDelete);
                textNotes = textNotes.filter(note => note.subject !== subjectToDelete);
                pdfNotes = pdfNotes.filter(pdf => pdf.subject !== subjectToDelete);

                saveState();
                renderSubjects();
                renderTextNotes();
                renderPdfNotes();
                populateSubjectSelects(); // Update dropdowns
            }

            function populateSubjectSelects() {
                const currentSubject = noteSubjectSelect.value; // Save current selection
                const currentPdfSubject = pdfSubjectSelect.value;

                noteSubjectSelect.innerHTML = '<option value="">Select Subject</option>';
                pdfSubjectSelect.innerHTML = '<option value="">Select Subject</option>';

                subjects.forEach(subject => {
                    const option1 = document.createElement('option');
                    option1.value = subject;
                    option1.textContent = subject;
                    noteSubjectSelect.appendChild(option1);

                    const option2 = document.createElement('option');
                    option2.value = subject;
                    option2.textContent = subject;
                    pdfSubjectSelect.appendChild(option2);
                });

                // Restore previous selection if still available
                if (subjects.includes(currentSubject)) {
                    noteSubjectSelect.value = currentSubject;
                }
                if (subjects.includes(currentPdfSubject)) {
                    pdfSubjectSelect.value = currentPdfSubject;
                }
            }

            function renderTextNotes() {
                textNotesList.innerHTML = '';
                if (textNotes.length === 0) {
                    textNotesList.innerHTML = '<p class="no-items">No text notes added yet.</p>';
                    return;
                }
                textNotes.forEach(note => {
                    const noteItem = document.createElement('div');
                    noteItem.classList.add('note-item');
                    noteItem.innerHTML = `
                        <h3>${note.title}</h3>
                        <p><strong>Subject:</strong> ${note.subject}</p>
                        <p class="note-content-preview">${note.content.substring(0, 100)}...</p>
                        <div class="note-actions">
                            <button class="btn-small view-note-btn" data-id="${note.id}"><i class="fas fa-eye"></i> View</button>
                            <button class="btn-small edit-note-btn" data-id="${note.id}"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn-small delete-note-btn" data-id="${note.id}"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    `;
                    textNotesList.appendChild(noteItem);
                });
            }

            function saveNote() {
                const title = noteTitleInput.value.trim();
                const subject = noteSubjectSelect.value;
                const content = noteContentInput.value.trim();
                const noteId = noteTitleInput.dataset.editId; // Check if editing existing note

                if (title && subject && content) {
                    if (noteId) {
                        // Editing existing note
                        const noteIndex = textNotes.findIndex(note => note.id === noteId);
                        if (noteIndex > -1) {
                            textNotes[noteIndex] = { id: noteId, title, subject, content };
                        }
                    } else {
                        // Adding new note
                        const newNote = {
                            id: Date.now().toString(),
                            title,
                            subject,
                            content
                        };
                        textNotes.push(newNote);
                    }
                    saveState();
                    renderTextNotes();
                    clearNoteForm();
                    delete noteTitleInput.dataset.editId; // Clear edit ID
                } else {
                    alert('Please fill in all fields for the note.');
                }
            }

            function clearNoteForm() {
                noteTitleInput.value = '';
                noteSubjectSelect.value = '';
                noteContentInput.value = '';
                delete noteTitleInput.dataset.editId;
            }

            function editNote(id) {
                const note = textNotes.find(n => n.id === id);
                if (note) {
                    noteTitleInput.value = note.title;
                    noteSubjectSelect.value = note.subject;
                    noteContentInput.value = note.content;
                    noteTitleInput.dataset.editId = note.id; // Store ID for saving changes
                }
            }

            function deleteNote(id) {
                textNotes = textNotes.filter(n => n.id !== id);
                saveState();
                renderTextNotes();
            }

            function renderPdfNotes() {
                pdfNotesList.innerHTML = '';
                if (pdfNotes.length === 0) {
                    pdfNotesList.innerHTML = '<p class="no-items">No PDF notes uploaded yet.</p>';
                    return;
                }
                pdfNotes.forEach(pdf => {
                    const pdfItem = document.createElement('div');
                    pdfItem.classList.add('pdf-item');
                    pdfItem.innerHTML = `
                        <span><i class="fas fa-file-pdf"></i> ${pdf.name}</span>
                        <span class="pdf-subject">(${pdf.subject || 'No Subject'})</span>
                        <div class="pdf-actions">
                            <a href="${pdf.url}" target="_blank" class="btn-small"><i class="fas fa-external-link-alt"></i> View</a>
                            <button class="btn-small delete-pdf-btn" data-id="${pdf.id}"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    pdfNotesList.appendChild(pdfItem);
                });
            }

            function uploadPdf() {
                const file = pdfUploadInput.files[0];
                const subject = pdfSubjectSelect.value;

                if (!file) {
                    alert('Please select a PDF file to upload.');
                    return;
                }
                if (!subject) {
                    alert('Please select a subject for the PDF.');
                    return;
                }

                if (file.type !== 'application/pdf') {
                    alert('Only PDF files are allowed.');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const newPdf = {
                        id: Date.now().toString(),
                        name: file.name,
                        subject: subject,
                        url: e.target.result // Base64 encoded URL
                    };
                    pdfNotes.push(newPdf);
                    saveState();
                    renderPdfNotes();
                    pdfUploadInput.value = ''; // Clear file input
                };
                reader.readAsDataURL(file); // Read file as Data URL (Base64)
            }

            function deletePdf(id) {
                pdfNotes = pdfNotes.filter(p => p.id !== id);
                saveState();
                renderPdfNotes();
            }


            // --- Timetable Functions ---
            function getWeekStart(date) {
                const day = date.getDay();
                const diff = date.getDate() - day + (day === 0 ? -6 : 1); // Adjust for Monday start (or Sunday if preferred)
                return new Date(date.setDate(diff));
            }

            function renderTimetable(weekStart) {
                // Adjust weekStart to be the actual Monday (or Sunday) of the week
                const adjustedWeekStart = getWeekStart(new Date(weekStart));
                adjustedWeekStart.setHours(0, 0, 0, 0); // Normalize to start of day

                const weekEnd = new Date(adjustedWeekStart);
                weekEnd.setDate(adjustedWeekStart.getDate() + 6); // End of Sunday

                currentWeekDisplay.textContent = `${adjustedWeekStart.toLocaleDateString()} - ${weekEnd.toLocaleDateString()}`;

                timetableGrid.innerHTML = ''; // Clear previous timetable

                const days = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
                const hours = Array.from({ length: 24 }, (_, i) => i); // 0-23 hours

                // Create header row (days)
                const headerRow = document.createElement('div');
                headerRow.classList.add('timetable-row', 'timetable-header');
                headerRow.innerHTML = '<div class="time-col"></div>'; // Empty corner
                days.forEach(day => {
                    const dayCol = document.createElement('div');
                    dayCol.classList.add('timetable-cell', 'day-header');
                    dayCol.textContent = day;
                    headerRow.appendChild(dayCol);
                });
                timetableGrid.appendChild(headerRow);

                // Create time rows
                hours.forEach(hour => {
                    const row = document.createElement('div');
                    row.classList.add('timetable-row');

                    const timeCell = document.createElement('div');
                    timeCell.classList.add('timetable-cell', 'time-col');
                    timeCell.textContent = `${hour}:00`;
                    row.appendChild(timeCell);

                    days.forEach(day => {
                        const cell = document.createElement('div');
                        cell.classList.add('timetable-cell', 'time-slot');
                        cell.dataset.day = day;
                        cell.dataset.hour = hour;

                        // Add schedule items to the correct cells
                        scheduleItems.filter(item => {
                            const itemDate = new Date(item.date); // Assuming item.date stores the date of the schedule
                            const itemDay = new Date(item.date).toLocaleDateString('en-US', { weekday: 'long' });
                            const itemHour = new Date(item.startTime).getHours();
                            return itemDay === day && itemHour === hour && itemDate >= adjustedWeekStart && itemDate <= weekEnd;
                        }).forEach(item => {
                            const itemDiv = document.createElement('div');
                            itemDiv.classList.add('schedule-item');
                            itemDiv.style.backgroundColor = item.color || 'var(--accent-color)';
                            itemDiv.innerHTML = `
                                <strong>${item.title}</strong><br>
                                <span>${item.startTime} - ${item.endTime}</span>
                            `;
                            // Add click listener to edit schedule item
                            itemDiv.addEventListener('click', (event) => {
                                event.stopPropagation(); // Prevent cell click
                                editScheduleItem(item.id);
                            });
                            cell.appendChild(itemDiv);
                        });
                        row.appendChild(cell);
                    });
                    timetableGrid.appendChild(row);
                });
            }

            function addScheduleItem(e) {
                e.preventDefault();
                const id = scheduleItemIdInput.value;
                const title = scheduleTitleInput.value.trim();
                const day = scheduleDaySelect.value;
                const startTime = scheduleStartTimeInput.value;
                const endTime = scheduleEndTimeInput.value;
                const color = scheduleColorInput.value;
                const notes = scheduleNotesInput.value.trim();

                if (!title || !day || !startTime || !endTime) {
                    alert('Please fill in all required schedule fields (Title, Day, Start Time, End Time).');
                    return;
                }

                // Convert day of week to a representative date within the current week for storage
                // This assumes currentWeekStart is already normalized to Monday
                const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const dayIndex = daysOfWeek.indexOf(day);
                const dateForSchedule = new Date(currentWeekStart);
                dateForSchedule.setDate(currentWeekStart.getDate() + (dayIndex - currentWeekStart.getDay() + 7) % 7);


                if (id) {
                    // Editing existing
                    const index = scheduleItems.findIndex(item => item.id === id);
                    if (index > -1) {
                        scheduleItems[index] = { id, title, day, startTime, endTime, color, notes, date: dateForSchedule.toISOString().split('T')[0] };
                    }
                } else {
                    // Adding new
                    const newItem = {
                        id: Date.now().toString(),
                        title,
                        day,
                        startTime,
                        endTime,
                        color,
                        notes,
                        date: dateForSchedule.toISOString().split('T')[0] // Store date for filtering by week
                    };
                    scheduleItems.push(newItem);
                }
                saveState();
                scheduleItemForm.reset();
                delete scheduleItemIdInput.value;
                switchView('timetable-view');
            }

            function editScheduleItem(id) {
                const item = scheduleItems.find(s => s.id === id);
                if (item) {
                    scheduleItemIdInput.value = item.id;
                    scheduleTitleInput.value = item.title;
                    scheduleDaySelect.value = item.day;
                    scheduleStartTimeInput.value = item.startTime;
                    scheduleEndTimeInput.value = item.endTime;
                    scheduleColorInput.value = item.color;
                    scheduleNotesInput.value = item.notes;
                    switchView('add-schedule-view'); // Switch to the form for editing
                }
            }


            // --- Data Backup & Restore ---
            function backupData() {
                const data = {
                    tasks: tasks,
                    subjects: subjects,
                    textNotes: textNotes,
                    pdfNotes: pdfNotes,
                    scheduleItems: scheduleItems,
                    pomodoroSessions: pomodoroSessions
                };
                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `study_planner_backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                alert('Data backed up successfully!');
            }

            function restoreData() {
                restoreFileInput.click(); // Trigger file input click
            }

            // --- Initialization ---
            function initializeApp() {
                applyTheme(currentTheme);
                switchView(currentView);
                completedSessionsSpan.textContent = pomodoroSessions;
                // Set initial time for pomodoro
                timeLeft = parseInt(workDurationInput.value) * 60;
                timerDisplay.textContent = formatTime(timeLeft);

                // Initialize timetable current week
                currentWeekStart = getWeekStart(new Date());
                renderTimetable(currentWeekStart);
            }


            // --- Event Listeners ---

            // Calculator
            calculatorContainer.addEventListener('click', (event) => {
                const { target } = event;
                const { action } = target.dataset;

                if (!target.matches('.calc-btn')) {
                    return;
                }

                if (target.dataset.action === 'number') {
                    inputDigit(target.textContent);
                } else if (target.dataset.action === 'decimal') {
                    inputDecimal(target.textContent);
                } else if (target.dataset.action === 'clear') {
                    clearCalculator();
                } else if (target.dataset.action === 'negative') {
                    toggleNegative();
                } else if (target.dataset.action === 'percent') {
                    calculatePercentage();
                } else if (target.dataset.action === 'calculate') {
                    if (firstOperand !== null && operator !== null && !waitingForSecondOperand) {
                        const result = operate(firstOperand, parseFloat(currentInput), operator);
                        calcOutput.value = parseFloat(result.toFixed(5));
                        currentInput = calcOutput.value;
                        firstOperand = null; // Clear for next calculation
                        operator = null;
                        waitingForSecondOperand = true; // Ready for new operation or number
                    }
                } else if (target.dataset.action === 'apply') {
                    // This calculator doesn't have an "apply" target for specific fields.
                    // You might need to integrate this calculator into input fields
                    // or remove the "apply" button if not needed.
                    alert("Apply functionality for calculator is not implemented for this version.");
                    calculatorContainer.style.display = 'none'; // Hide calculator after applying
                    resetCalculator(); // Reset calculator for next use
                } else if (target.matches('.calc-operator')) {
                    handleOperator(action);
                }
            });


            // To-Do List
            addTaskBtn.addEventListener('click', () => {
                // This button is for quick add on dashboard.
                // The form submission handles the detailed add.
                const description = newTaskInput.value.trim();
                if (description) {
                    const newTask = {
                        id: Date.now().toString(),
                        description,
                        dueDate: '', // No due date for quick add
                        priority: 'medium', // Default priority for quick add
                        recurrence: 'none',
                        subtasks: [],
                        completed: false
                    };
                    tasks.push(newTask);
                    saveState();
                    renderTasks();
                    newTaskInput.value = '';
                } else {
                    alert('Task description cannot be empty for quick add.');
                }
            });

            addTaskForm.addEventListener('submit', addTask);
            addSubtaskBtn.addEventListener('click', addSubtaskInput);

            taskList.addEventListener('click', (e) => {
                if (e.target.type === 'checkbox') {
                    toggleTaskComplete(e.target.dataset.id);
                } else if (e.target.closest('.delete-task-btn')) {
                    deleteTask(e.target.closest('.delete-task-btn').dataset.id);
                } else if (e.target.closest('.edit-task-btn')) {
                    alert('Edit task functionality is not yet implemented.'); // Placeholder
                    // You would typically load task data into the add/edit task form here
                }
            });

            // Pomodoro Timer
            startTimerBtn.addEventListener('click', startTimer);
            pauseTimerBtn.addEventListener('click', pauseTimer);
            resetTimerBtn.addEventListener('click', resetTimer);
            workDurationInput.addEventListener('change', resetTimer);
            shortBreakDurationInput.addEventListener('change', resetTimer);
            longBreakDurationInput.addEventListener('change', resetTimer);

            // Notes
            addSubjectBtn.addEventListener('click', addSubject);
            subjectList.addEventListener('click', (e) => {
                if (e.target.closest('.delete-subject-btn')) {
                    deleteSubject(e.target.closest('.delete-subject-btn').dataset.subject);
                }
            });
            saveNoteBtn.addEventListener('click', saveNote);
            clearNoteFormBtn.addEventListener('click', clearNoteForm);
            textNotesList.addEventListener('click', (e) => {
                if (e.target.closest('.edit-note-btn')) {
                    editNote(e.target.closest('.edit-note-btn').dataset.id);
                } else if (e.target.closest('.delete-note-btn')) {
                    deleteNote(e.target.closest('.delete-note-btn').dataset.id);
                } else if (e.target.closest('.view-note-btn')) {
                    alert('View note functionality is not yet implemented. Please use edit to see full content.'); // Placeholder
                    // You might open a modal or new view for full note display
                }
            });
            uploadPdfBtn.addEventListener('click', uploadPdf);
            pdfNotesList.addEventListener('click', (e) => {
                if (e.target.closest('.delete-pdf-btn')) {
                    deletePdf(e.target.closest('.delete-pdf-btn').dataset.id);
                }
                // View PDF is handled by the <a> tag with target="_blank"
            });

            // Timetable
            prevWeekBtn.addEventListener('click', () => {
                currentWeekStart.setDate(currentWeekStart.getDate() - 7);
                renderTimetable(currentWeekStart);
            });
            nextWeekBtn.addEventListener('click', () => {
                currentWeekStart.setDate(currentWeekStart.getDate() + 7);
                renderTimetable(currentWeekStart);
            });
            addScheduleItemBtn.addEventListener('click', () => switchView('add-schedule-view'));
            scheduleItemForm.addEventListener('submit', addScheduleItem);


            // Backup/Restore
            backupDataBtn.addEventListener('click', backupData);
            restoreDataBtn.addEventListener('click', restoreData);
            restoreFileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const loadedData = JSON.parse(e.target.result);
                            if (confirm('Are you sure you want to restore data? This will overwrite current data.')) {
                                tasks = loadedData.tasks || [];
                                subjects = loadedData.subjects || [];
                                textNotes = loadedData.textNotes || [];
                                pdfNotes = loadedData.pdfNotes || [];
                                scheduleItems = loadedData.scheduleItems || [];
                                pomodoroSessions = loadedData.pomodoroSessions || 0;
                                saveState();
                                initializeApp(); // Re-render all components
                                alert('Data restored successfully!');
                            }
                        } catch (error) {
                            alert('Failed to restore data. Please ensure the file is a valid JSON backup.');
                            console.error('Error restoring data:', error);
                        }
                    };
                    reader.readAsText(file);
                }
            });


            // --- Event Listeners ---
            themeToggleBtn.addEventListener('click', () => {
                const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                applyTheme(newTheme);
            });

            calculatorToggleBtn.addEventListener('click', () => {
                calculatorContainer.style.display = calculatorContainer.style.display === 'none' ? 'flex' : 'none';
                if (calculatorContainer.style.display === 'none') {
                    resetCalculator();
                }
            });

            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    switchView(item.dataset.view);
                });
            });

            backToDashboardBtns.forEach(btn => {
                btn.addEventListener('click', () => switchView('dashboard-view'));
            });

            if (backToTimetableBtn) { // Check if element exists before adding listener
                backToTimetableBtn.addEventListener('click', () => switchView('timetable-view'));
            }


            // --- Initialize on Load ---
            initializeApp();
        });
    </script>
</body>
</html>
